name: Sync from Gitee (Pro)

on:
  schedule:
    - cron: '0 */6 * * *'   # 每6小时
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 检出当前 GitHub 仓库
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      # 2️⃣ 拉取 Gitee 仓库（临时目录 repo）
      - name: Clone Gitee repo
        run: |
          git clone --depth=1 --branch master https://gitee.com/Mercator/vibe-research.git repo

      # 3️⃣ 删除 git 元数据（避免污染）
      - name: Remove git metadata
        run: |
          rm -rf repo/.git

      # 4️⃣ 同步文件（核心步骤）
      - name: Sync files
        run: |
          rsync -av --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude ".*/" \
            repo/ ./

      # 5️⃣ 清理临时目录（避免残留）
      - name: Cleanup
        run: |
          rm -rf repo

      # 6️⃣ 提交并推送
      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .
          git commit -m "auto sync from gitee" || echo "no changes"

          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
