name: Sync Gitee Repo

on:
  schedule:
    - cron: '0 */6 * * *'   # 每6小时同步一次（可改）
  workflow_dispatch:        # 支持手动触发

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取当前 GitHub 仓库
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      # 2. 克隆 Gitee 仓库（指定 master 分支）
      - name: Clone from Gitee
        run: |
          git clone --depth=1 --branch master https://gitee.com/Mercator/vibe-research.git source

      # 3. 同步文件（完全镜像）
      - name: Sync files
        run: |
          rsync -av --delete \
            --filter "protect .*/" \
            --exclude ".git" \
            --exclude ".github" \
            source/ ./
            
      # 4. 提交并推送到 GitHub
      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .
          git commit -m "auto sync from gitee" || echo "no changes"

          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
